server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow multi-image batch uploads through the proxy.
    client_max_body_size 25m;

    # Hashed build assets never change content -> cache them forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API -> backend container.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # CPU vision extraction can be slow

        # SSE (/api/products/{id}/events): stream events without buffering and
        # keep the upstream connection alive. The backend also sends
        # X-Accel-Buffering: no, which nginx honours per-response.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Uploaded images served by the backend; cache briefly in the browser.
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /health {
        proxy_pass http://backend:8000;
    }

    # SPA fallback for client-side (hash) routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
